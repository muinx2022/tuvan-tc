x-backend-env: &backend-env
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DEBUG: ${DEBUG}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS}
  APP_JWT_SECRET: ${APP_JWT_SECRET}
  APP_JWT_ACCESS_TOKEN_MINUTES: ${APP_JWT_ACCESS_TOKEN_MINUTES}
  APP_JWT_REFRESH_TOKEN_DAYS: ${APP_JWT_REFRESH_TOKEN_DAYS}
  APP_AUTH_PASSWORD_RESET_MINUTES: ${APP_AUTH_PASSWORD_RESET_MINUTES}
  APP_AUTH_PASSWORD_RESET_EXPOSE_TOKEN: ${APP_AUTH_PASSWORD_RESET_EXPOSE_TOKEN}
  APP_GOOGLE_CLIENT_ID: ${APP_GOOGLE_CLIENT_ID}
  APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL}
  APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD}
  APP_CORS_WEB_ORIGIN: ${APP_CORS_WEB_ORIGIN}
  APP_CORS_ADMIN_ORIGIN: ${APP_CORS_ADMIN_ORIGIN}
  APP_MEDIA_PUBLIC_BASE_URL: ${APP_MEDIA_PUBLIC_BASE_URL}
  APP_LOG_REQUESTS: ${APP_LOG_REQUESTS}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT}

services:
  deploy-listener:
    build:
      context: ./vps
      dockerfile: Dockerfile
    container_name: gikky-deploy-listener
    restart: unless-stopped
    environment:
      DEPLOY_HOST: 0.0.0.0
      DEPLOY_PORT: 8787
      DEPLOY_WEBHOOK_TOKEN: ${DEPLOY_WEBHOOK_TOKEN}
      DEPLOY_SCRIPT: /workspace/deploy/vps/deploy.sh
      DEPLOY_COMPOSE_DIR: /workspace
      DEPLOY_COMPOSE_FILE: deploy/docker-compose.prod.yml
      DEPLOY_RETRIES: ${DEPLOY_RETRIES:-3}
      DEPLOY_RETRY_DELAY: ${DEPLOY_RETRY_DELAY:-10}
      COMPOSE_PROJECT_NAME: gikky-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/workspace
    networks:
      - gikky-network
      - shared-network

  postgres:
    image: postgres:16
    container_name: gikky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gikky-network
      - shared-network

  backend:
    image: ${BACKEND_IMAGE}
    container_name: gikky-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment: *backend-env
    ports:
      - "8081:8080"
    volumes:
      - media_data:/app/media
    networks:
      - gikky-network
      - shared-network

  t0-worker:
    image: ${BACKEND_IMAGE}
    container_name: gikky-t0-worker
    restart: unless-stopped
    depends_on:
      - postgres
    command: ["python", "manage.py", "run_t0_worker"]
    environment: *backend-env
    volumes:
      - media_data:/app/media
    networks:
      - gikky-network
      - shared-network

  t0-foreign-worker:
    image: ${BACKEND_IMAGE}
    container_name: gikky-t0-foreign-worker
    restart: unless-stopped
    depends_on:
      - postgres
    command: ["python", "manage.py", "run_t0_foreign_worker"]
    environment: *backend-env
    volumes:
      - media_data:/app/media
    networks:
      - gikky-network
      - shared-network

  foreign-backfill-worker:
    image: ${BACKEND_IMAGE}
    container_name: gikky-foreign-backfill-worker
    restart: unless-stopped
    depends_on:
      - postgres
    command: ["python", "manage.py", "run_foreign_backfill_worker"]
    environment: *backend-env
    volumes:
      - media_data:/app/media
    networks:
      - gikky-network
      - shared-network

  web:
    image: ${WEB_IMAGE}
    container_name: gikky-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3004:3000"
    networks:
      - gikky-network
      - shared-network

  admin:
    image: ${ADMIN_IMAGE}
    container_name: gikky-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3005:80"
    networks:
      - gikky-network
      - shared-network

volumes:
  postgres_data:
  media_data:

networks:
  gikky-network:
    external: true
    name: gikky-net_gikky-network
  shared-network:
    external: true
