name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            admin/package-lock.json

      - name: Verify web build
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Verify admin build
        run: |
          npm --prefix admin ci
          npm --prefix admin run build

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-backend:main
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-backend:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-web:main
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-web:${{ github.sha }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-admin:main
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-admin:${{ github.sha }}

      - name: Notify deploy listener
        shell: bash
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          payload=$(cat <<EOF
          {"ref":"${GITHUB_REF}","sha":"${GITHUB_SHA}","services":["backend","web","admin"]}
          EOF
          )

          attempt=1
          max_attempts=5
          delay=15

          while true; do
            status=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "$DEPLOY_WEBHOOK_URL" \
              -H "content-type: application/json" \
              -H "x-deploy-token: $DEPLOY_WEBHOOK_TOKEN" \
              --data "$payload" || true)

            echo "Attempt $attempt/$max_attempts -> HTTP $status"
            cat response.json || true
            echo

            if [ "$status" = "200" ]; then
              exit 0
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Deploy notify failed after $max_attempts attempts" >&2
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep "$delay"
          done
