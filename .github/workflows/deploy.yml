name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-backend:main
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-backend:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-web:main
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-web:${{ github.sha }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-admin:main
            ${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-admin:${{ github.sha }}

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_vps
          chmod 600 ~/.ssh/id_vps
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare deploy env
        shell: bash
        run: |
          cat > .deploy.env <<EOF
          BACKEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-backend:${{ github.sha }}
          WEB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-web:${{ github.sha }}
          ADMIN_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/tuvan-tc-admin:${{ github.sha }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG=${{ secrets.DEBUG }}
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
          APP_JWT_ACCESS_TOKEN_MINUTES=${{ secrets.APP_JWT_ACCESS_TOKEN_MINUTES }}
          APP_JWT_REFRESH_TOKEN_DAYS=${{ secrets.APP_JWT_REFRESH_TOKEN_DAYS }}
          APP_AUTH_PASSWORD_RESET_MINUTES=${{ secrets.APP_AUTH_PASSWORD_RESET_MINUTES }}
          APP_AUTH_PASSWORD_RESET_EXPOSE_TOKEN=${{ secrets.APP_AUTH_PASSWORD_RESET_EXPOSE_TOKEN }}
          APP_GOOGLE_CLIENT_ID=${{ secrets.APP_GOOGLE_CLIENT_ID }}
          APP_SEED_ADMIN_EMAIL=${{ secrets.APP_SEED_ADMIN_EMAIL }}
          APP_SEED_ADMIN_PASSWORD=${{ secrets.APP_SEED_ADMIN_PASSWORD }}
          APP_CORS_WEB_ORIGIN=${{ secrets.APP_CORS_WEB_ORIGIN }}
          APP_CORS_ADMIN_ORIGIN=${{ secrets.APP_CORS_ADMIN_ORIGIN }}
          APP_MEDIA_PUBLIC_BASE_URL=${{ secrets.APP_MEDIA_PUBLIC_BASE_URL }}
          APP_LOG_REQUESTS=${{ secrets.APP_LOG_REQUESTS }}
          GUNICORN_WORKERS=${{ secrets.GUNICORN_WORKERS }}
          GUNICORN_TIMEOUT=${{ secrets.GUNICORN_TIMEOUT }}
          EOF

      - name: Upload deploy files
        shell: bash
        run: |
          scp -i ~/.ssh/id_vps deploy/docker-compose.prod.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml"
          scp -i ~/.ssh/id_vps .deploy.env "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}/.env"

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/id_vps "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -e
            cd '${{ secrets.DEPLOY_PATH }}'
            chmod 600 .env
            echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af --filter 'until=168h' || true
          "
