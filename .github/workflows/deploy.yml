name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            admin/package-lock.json

      - name: Verify web build
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Verify admin build
        run: |
          npm --prefix admin ci
          npm --prefix admin run build

      - name: Notify deploy listener
        shell: bash
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          payload=$(cat <<EOF
          {"ref":"${GITHUB_REF}","sha":"${GITHUB_SHA}","services":["backend","web","admin"]}
          EOF
          )

          attempt=1
          max_attempts=5
          delay=15

          while true; do
            status=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "$DEPLOY_WEBHOOK_URL" \
              -H "content-type: application/json" \
              -H "x-deploy-token: $DEPLOY_WEBHOOK_TOKEN" \
              --data "$payload" || true)

            echo "Attempt $attempt/$max_attempts -> HTTP $status"
            cat response.json || true
            echo

            if [ "$status" = "200" ]; then
              exit 0
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Deploy notify failed after $max_attempts attempts" >&2
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep "$delay"
          done
